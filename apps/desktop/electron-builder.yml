appId: com.rookery.desktop
productName: Rookery
# npm workspaces hoist electron to the root, so electron-builder fails to auto-detect the version → pin it explicitly.
electronVersion: 32.3.3
# After the build, notarize + staple the dmg (notarize:true only notarizes the .app) → a downloaded dmg opens cleanly even offline on first launch.
afterAllArtifactBuild: build/notarize-dmg.cjs
# Auto-update feed: baked into the app (app-update.yml) so electron-updater knows where to look, and makes electron-builder emit latest-mac.yml.
publish:
  provider: github
  owner: CChuYong
  repo: rookery
directories:
  output: dist
files:
  - out/**
# node-pty is a native module — the .node/spawn-helper binaries must be unpacked outside asar to load (integrated terminal).
asarUnpack:
  - "**/node_modules/node-pty/**"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Single arm64 distribution (Apple Silicon). dmg = human download, zip = for auto-update (electron-updater).
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  # notarization: passes only if every Mach-O in the bundle has hardened runtime + a Developer ID signature.
  # The bundled Node binary and the better-sqlite3 / node-pty .node files are signed via entitlementsInherit.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # The Resources walk auto-signs the bundled Node, but list it explicitly in case the isbinaryfile heuristic misses it (insurance).
  binaries:
    - Contents/Resources/node/node
  # notarize: true → uses credentials from environment variables:
  #   API key:  APPLE_API_KEY (.p8 path) · APPLE_API_KEY_ID · APPLE_API_ISSUER
  #   or ID:    APPLE_ID · APPLE_APP_SPECIFIC_PASSWORD · APPLE_TEAM_ID
  # The signing identity auto-selects the Developer ID Application certificate from the Keychain (can be pinned via CSC_NAME).
  notarize: true
extraResources:
  # Third-party license notices — must ship with the redistributed binaries (deps, OFL fonts, Anthropic SDK).
  # THIRD-PARTY-LICENSES.txt is regenerated by build:mac; the bundled Node's own LICENSE rides along in resources/node.
  - from: ../../THIRD-PARTY-LICENSES.txt
    to: licenses/THIRD-PARTY-LICENSES.txt
  - from: ../../NOTICE
    to: licenses/NOTICE
  - from: ../../LICENSE
    to: licenses/LICENSE
  - from: ../../dist
    to: daemon-dist
  # Bundled Node 22 (arm64): the daemon runs on this Node even if the user's machine has no Node or a mismatched ABI.
  # apps/desktop/scripts/fetch-node.mjs prepares it at resources/node/node before the build.
  - from: resources/node
    to: node
  # The daemon is a separate process spawned with an external Node, so electron-builder doesn't auto-bundle its deps.
  # Using the whole root node_modules would drag in workspace-hoisted desktop/build deps (electron .app, node-pty, etc.),
  # bloating the bundle + breaking codesign via external symlinks → stage-daemon-deps.mjs prepares a prod-only tree.
  - from: resources/daemon-deps/node_modules
    to: daemon-dist/node_modules
    filter:
      - "**/*"
      # The .bin CLI symlinks and node-gyp temp symlinks aren't needed at runtime + are external symlinks that break codesign --deep --strict.
      - "!**/.bin"
      - "!**/.bin/**"
      - "!**/node_gyp_bins/**"
