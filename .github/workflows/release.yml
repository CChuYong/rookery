name: Release

# On a tag (v*) push: build per-platform on native runners, then publish to a GitHub Release.
# electron-updater reads the Release's latest-{mac,linux}.yml + artifacts to auto-update.
# workflow_dispatch runs the builds only (no publish) — useful to validate a build without releasing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # action-gh-release creates/uploads the Release (uses GITHUB_TOKEN)

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck + test
        run: |
          npm run typecheck && npm test
          npm -w apps/desktop run typecheck && npm -w apps/desktop run test

  build-mac:
    needs: gate
    runs-on: macos-14 # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # node-gyp (@electron/rebuild node-pty, better-sqlite3 source fallback) needs distutils,
      # absent from the runner's default Python 3.12 (removed in 3.12). Pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      # Tag is the single source of truth for the version (skipped on workflow_dispatch).
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          npm version "$V" --no-git-tag-version --allow-same-version
          npm version "$V" --no-git-tag-version --allow-same-version -w apps/desktop
      - name: Prepare Apple API key (.p8)
        run: echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "${{ runner.temp }}/AuthKey.p8"
      - name: Build · sign · notarize · staple
        run: npm run build && npm -w apps/desktop run build:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Stable-named dmg (constant download URL)
        run: cp apps/desktop/dist/Rookery-*-arm64.dmg apps/desktop/dist/rookery-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest-mac.yml

  build-linux:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # node-gyp for @electron/rebuild (node-pty) + better-sqlite3 source fallback
      - run: npm ci
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          npm version "$V" --no-git-tag-version --allow-same-version
          npm version "$V" --no-git-tag-version --allow-same-version -w apps/desktop
      - name: Build (AppImage)
        run: npm run build && npm -w apps/desktop run build:linux
      - name: Stable-named AppImage (constant download URL)
        run: cp apps/desktop/dist/Rookery-*.AppImage apps/desktop/dist/rookery-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/latest-linux.yml

  build-windows:
    needs: gate
    runs-on: windows-latest
    defaults:
      run:
        shell: bash # bash for run steps (Git Bash); npm scripts still run in cmd internally
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # node-gyp for better-sqlite3 source fallback
      - run: npm ci
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          V="${GITHUB_REF_NAME#v}"
          npm version "$V" --no-git-tag-version --allow-same-version
          npm version "$V" --no-git-tag-version --allow-same-version -w apps/desktop
      - name: Build (NSIS, unsigned)
        run: npm run build && npm -w apps/desktop run build:win
      - name: Stable-named installer (constant download URL)
        run: cp apps/desktop/dist/Rookery*Setup*.exe apps/desktop/dist/rookery-x64-setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest.yml

  release:
    needs: [build-mac, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') # publish only on a tag, not on workflow_dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts # → artifacts/mac/* and artifacts/linux/*
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
