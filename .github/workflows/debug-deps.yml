name: Debug deps
on: { workflow_dispatch: {} }
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: after npm ci
        run: ls node_modules/app-builder-bin/linux/x64/app-builder >/dev/null 2>&1 && echo "PRESENT" || echo "GONE"
      - name: run stage-daemon-deps
        run: node apps/desktop/scripts/stage-daemon-deps.mjs
      - name: after stage-daemon-deps
        run: ls node_modules/app-builder-bin/linux/x64/app-builder >/dev/null 2>&1 && echo "PRESENT" || echo "GONE"
