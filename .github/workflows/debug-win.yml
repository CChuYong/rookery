name: Debug win
on: { workflow_dispatch: {} }
jobs:
  d:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Build (NSIS, unsigned)
        run: npm run build && npm -w apps/desktop run build:win
      - name: List artifacts
        if: always()
        run: ls -la apps/desktop/dist/ || echo "no dist"
