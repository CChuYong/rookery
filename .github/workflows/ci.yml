name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # better-sqlite3 native ABI + engines.node >=22
          cache: npm
      - run: npm ci
      - name: typecheck (root)
        run: npm run typecheck
      - name: test (root)
        run: npm test
      - name: typecheck (desktop)
        run: npm -w apps/desktop run typecheck
      - name: test (desktop)
        run: npm -w apps/desktop run test
